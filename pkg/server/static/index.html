<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>AgentDB</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🗄️ AgentDB</h2>
            </div>
            <div class="sidebar-section">
                <h3>📊 Таблицы</h3>
                <div id="tables-list"></div>
            </div>
            <div class="sidebar-section">
                <h3>🔍 Анализ кода</h3>
                <input type="text" id="repo-path" placeholder="Путь к репозиторию" value=".">
                <button id="btn-parse">Анализировать</button>
                <div id="parse-status"></div>
            </div>
            <div class="sidebar-section" id="node-details-section" style="display:none;">
                <h3>📌 Node Details</h3>
                <div id="node-details"></div>
            </div>
        </aside>
        <main class="main">
            <div class="tabs">
                <button class="tab active" data-tab="sql">SQL</button>
                <button class="tab" data-tab="graph">Граф кода</button>
            </div>

            <div class="tab-content active" id="tab-sql">
                <textarea id="sql-input" placeholder="SELECT * FROM ..." rows="4"></textarea>
                <button id="btn-execute">▶ Выполнить</button>
                <pre id="result-output"></pre>
            </div>

            <div class="tab-content" id="tab-graph">
                <div class="graph-controls">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="class">Classes</button>
                    <button class="filter-btn" data-filter="function">Functions</button>
                    <input type="text" id="search-input" placeholder="Search...">
                </div>
                <canvas id="graph-canvas" width="900" height="600"></canvas>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
